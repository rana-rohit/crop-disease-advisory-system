services:
  - type: web
    name: smart-crop-disease-detection
    env: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: GUNICORN_THREADS
        value: "1"
      - key: CORS_ORIGINS
        sync: false
